name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java: [17, 21]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v3
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Build with Maven
      run: mvn clean install -DskipTests

    - name: Run tests
      run: mvn test

    - name: Generate JaCoCo report (optional)
      run: mvn org.jacoco:jacoco-maven-plugin:report
      continue-on-error: true

    - name: Upload coverage to Codecov
      if: ${{ hashFiles('**/target/site/jacoco/jacoco.xml') != '' }}
      uses: codecov/codecov-action@v3
      with:
        files: target/site/jacoco/jacoco.xml

  build-gradle:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java: [17, 21]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v3
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: current

    - name: Build with Gradle
      shell: pwsh
      run: |
        if (Test-Path './gradlew') {
          if ($env:RUNNER_OS -ne 'Windows') {
            chmod +x gradlew
          }
          ./gradlew clean build -x test
        } else {
          gradle clean build -x test
        }

    - name: Run tests
      shell: pwsh
      run: |
        if (Test-Path './gradlew') {
          if ($env:RUNNER_OS -ne 'Windows') {
            chmod +x gradlew
          }
          ./gradlew test
        } else {
          gradle test
        }

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: 17
        distribution: 'temurin'

    - name: Run checkstyle
      run: mvn checkstyle:check
      continue-on-error: true

  package:
    runs-on: ubuntu-latest
    needs: [build, build-gradle]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: 17
        distribution: 'temurin'

    - name: Build package
      run: mvn clean package -DskipTests

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: jcli-toolkit-jar
        path: cli-entry/target/*.jar

    - name: Upload release assets
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: cli-entry/target/*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
