name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java: [17, 21]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build with Gradle
      run: ./gradlew clean build -x test --no-daemon --stacktrace

    - name: Run tests
      run: ./gradlew test --no-daemon --stacktrace

    - name: Build shadow JAR
      run: ./gradlew :cli-entry:shadowJar --no-daemon --stacktrace

    - name: Upload shadow JAR
      uses: actions/upload-artifact@v4
      with:
        name: jcli-toolkit-jar
        path: cli-entry/build/libs/*.jar

  native-build:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up GraalVM JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: 'graalvm'
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
    - name: Native compile
      run: ./gradlew :cli-entry:nativeCompile --no-daemon
      continue-on-error: true
    - name: Upload native binary
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: jcli-native-linux
        path: cli-entry/build/native/nativeCompile/jcli